name: CI-CD
on:  
  push:
    branches: ["main"]
  workflow_dispatch: 
jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - name: obtendo o código
        uses: actions/checkout@v6.0.2
      - name: Autenticando no DockerHub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


