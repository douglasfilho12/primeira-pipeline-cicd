name: CI-CD
on:  
  push:
    branches: ["main"]
  workflow_dispatch: 
jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - name: obtendo o código
        uses: actions/checkout@v4.1.7
      - name: Autenticando no DockerHub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker build
        uses: docker/build-push-action@v6.19.2
        with:
          context: ./src
          push: true
          tags: |
            douglasfilho/aula-primeira-pipeline:v${{ github.run_number }}
            douglasfilho/aula-primeira-pipeline:latest
  CD:
    runs-on: ubuntu-latest
    needs: CI
    steps:
      - name: obtendo o código
        uses: actions/checkout@v4.1.7
      - name: contexto kubernetes
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.K8S_KUBECONFIG }}
      - name: Execução de manifesto
        uses: Azure/k8s-deploy@v4.9
        with:
          namespace: 'pipeline'
          manifests: |
            ./k8s/deployment.yaml
          images: |
            douglasfilho/aula-primeira-pipeline:v${{ github.run_number }}
       
        
        
          





